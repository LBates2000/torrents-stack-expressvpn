# Optimized Docker Compose for Torrents stack

x-defaults: &defaults
  restart: unless-stopped

x-dns: &common-dns
  dns:
    - ${DNS1:-8.8.8.8}
    - ${DNS2:-1.1.1.1}

x-common-volumes: &common-volumes
  volumes:
    - ./configs:/config
    - ./downloads:/downloads

x-health: &common-health
  interval: 20s
  timeout: 10s
  retries: 8
  start_period: 30s

networks:
  app_net:
    driver: bridge

services:
  # expressvpn and flaresolverr start independently.
  # jackett depends on flaresolverr.
  # qbittorrent depends on expressvpn, jackett, and flaresolverr.
  # Only qbittorrent uses network_mode: service:expressvpn.
  # Jackett and FlareSolverr run on app_net with their own port mappings.
  expressvpn:
    image: polkaned/expressvpn:${EXPRESSVPN_IMAGE_TAG:-latest}
    <<: [*defaults, *common-dns]
    container_name: expressvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - ACTIVATION_CODE=${EXPRESSVPN_ACTIVATION_CODE:-}
      - SERVER=${EXPRESSVPN_SERVER:-smart}
      - PROTOCOL=${EXPRESSVPN_PROTOCOL:-auto}
    healthcheck:
      <<: *common-health
      test: ["CMD-SHELL", "if [ -z \"$$ACTIVATION_CODE\" ]; then exit 0; fi; grep -q '^ *tun0:' /proc/net/dev"]
    ports:
      - "${QBITTORRENT_WEBUI_PORT:-8080}:${QBITTORRENT_WEBUI_PORT:-8080}"
      - "${QBITTORRENT_TORRENTING_PORT:-6881}:6881"
      - "${QBITTORRENT_TORRENTING_PORT:-6881}:6881/udp"
    volumes:
      - ./configs/expressvpn:/etc/expressvpn
    networks:
      - app_net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:${FLARESOLVERR_IMAGE_TAG:-latest}
    <<: [*defaults, *common-dns]
    container_name: flaresolverr
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-none}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ:-Etc/UTC}
    healthcheck:
      <<: *common-health
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:8191 | grep -q '\"msg\".*\"FlareSolverr is ready!\"'"]
    networks:
      - app_net

  jackett:
    image: lscr.io/linuxserver/jackett:${JACKETT_IMAGE_TAG:-latest}
    <<: [*defaults, *common-dns, *common-volumes]
    container_name: jackett
    ports:
      - "${JACKETT_PORT:-9117}:9117"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - AUTO_UPDATE=${JACKETT_AUTO_UPDATE:-true}
      - RUN_OPTS=${JACKETT_RUN_OPTS:-}
    healthcheck:
      <<: *common-health
      test: ["CMD", "bash", "-c", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9117/ --max-time 10 | grep -qE '^(200|301|302)$'"]
    depends_on:
      flaresolverr:
        condition: service_healthy
    networks:
      - app_net

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:${QBITTORRENT_IMAGE_TAG:-latest}
    <<: [*defaults, *common-volumes]
    container_name: qbittorrent
    network_mode: "service:expressvpn"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - WEBUI_PORT=${QBITTORRENT_WEBUI_PORT:-8080}
      - TORRENTING_PORT=${QBITTORRENT_TORRENTING_PORT:-6881}
    healthcheck:
      <<: *common-health
      test: ["CMD", "bash", "-c", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/ --max-time 10 | grep -qE '^(200|302)$'"]
    depends_on:
      expressvpn:
        condition: service_healthy
      jackett:
        condition: service_healthy
      flaresolverr:
        condition: service_healthy
