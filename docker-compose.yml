# Optimized Docker Compose for Torrents stack

x-defaults: &defaults
  restart: unless-stopped

x-dns: &common-dns
  dns:
    - ${DNS1:-8.8.8.8}
    - ${DNS2:-1.1.1.1}

x-common-app-environment: &common-app-environment
  TZ: ${TZ:-Etc/UTC}

x-linuxserver-environment: &linuxserver-environment
  PUID: ${PUID:-1000}
  PGID: ${PGID:-1000}
  TZ: ${TZ:-Etc/UTC}

x-qbittorrent-command: &qbittorrent-command
  command: >-
    /bin/bash -c "sleep 20 &&
    { echo 'nameserver 127.0.0.11'; grep -v '^nameserver 127.0.0.11$' /shared_data/resolv.conf; } > /etc/resolv.conf &&
    mkdir -p ${CONTAINER_DOWNLOADS_DIR:-/downloads}/watch ${CONTAINER_DOWNLOADS_DIR:-/downloads}/watch/movies ${CONTAINER_DOWNLOADS_DIR:-/downloads}/watch/tv &&
    bash /tmp/bootstrap-qbittorrent-jackett.sh || true &&
    sleep infinity"

x-health: &common-health
  # Tuned for faster feedback (all services healthy <2m)
  interval: ${HEALTHCHECK_INTERVAL:-30s}
  timeout: ${HEALTHCHECK_TIMEOUT:-30s}
  retries: ${HEALTHCHECK_RETRIES:-10}
  start_period: ${HEALTHCHECK_START_PERIOD:-180s}  # 3 minutes

x-depends-on-healthy: &depends-on-healthy
  condition: service_healthy

networks:
  app_net:
    driver: ${APP_NET_DRIVER:-bridge}
    labels:
      - com.torrents-stack.project=expressvpn-stack

services:
  # expressvpn and flaresolverr start independently.
  # jackett depends on flaresolverr.
  # qbittorrent depends on expressvpn, jackett, and flaresolverr.
  # Only qbittorrent uses network_mode: service:expressvpn.
  # Jackett and FlareSolverr run on app_net with their own port mappings.
  expressvpn:
    image: polkaned/expressvpn:${EXPRESSVPN_IMAGE_TAG:-latest}
    <<: [*defaults, *common-dns]
    container_name: ${EXPRESSVPN_CONTAINER_NAME:-expressvpn}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    stdin_open: true
    tty: true
    privileged: true
    # Pass the ExpressVPN activation code from .env (required for login)
    environment:
      - ACTIVATION_CODE=${EXPRESSVPN_ACTIVATION_CODE:-} # Set this in your .env file
      - REGION=${EXPRESSVPN_REGION:-uk-docklands}
      - SERVER=${EXPRESSVPN_REGION:-uk-docklands}
      - PROTOCOL=${EXPRESSVPN_PROTOCOL:-auto}
      - EXPRESSVPN_HEALTHCHECK_MODE=${EXPRESSVPN_HEALTHCHECK_MODE:-strict}
    entrypoint: /bin/bash /tmp/entrypoint.sh
    command: /bin/bash -c "cp /etc/resolv.conf /shared_data/resolv.conf; while true; do sleep 30; done"
    volumes:
      - ./scripts:/scripts:ro
      - shared-volume:/shared_data
      - ${HOST_EXPRESSVPN_ENTRYPOINT_SCRIPT:-./scripts/expressvpn-entrypoint-fixed.sh}:/tmp/entrypoint.sh:ro
    healthcheck:
      <<: *common-health
      test: ["CMD", "bash", "/scripts/expressvpn-healthcheck.sh"]
    ports:
      - "${QBITTORRENT_WEBUI_PORT:-8080}:${QBITTORRENT_WEBUI_PORT:-8080}"
      - "${QBITTORRENT_TORRENTING_PORT:-6881}:6881"
      - "${QBITTORRENT_TORRENTING_PORT:-6881}:6881/udp"
    networks:
      - app_net
    labels:
      - com.torrents-stack.project=expressvpn-stack

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:${FLARESOLVERR_IMAGE_TAG:-latest}
    <<: [*defaults, *common-dns]
    container_name: ${FLARESOLVERR_CONTAINER_NAME:-flaresolverr}
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    environment:
      <<: *common-app-environment
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: ${LOG_FILE:-none}
      LOG_HTML: ${LOG_HTML:-false}
      CAPTCHA_SOLVER: ${CAPTCHA_SOLVER:-none}
    volumes:
      - ./scripts:/scripts:ro
    healthcheck:
      <<: *common-health
      test:
        - "CMD"
        - "bash"
        - "/scripts/flaresolverr-dns-web-healthcheck.sh"
    networks:
      - app_net
    labels:
      - com.torrents-stack.project=expressvpn-stack

  jackett:
    image: lscr.io/linuxserver/jackett:${JACKETT_IMAGE_TAG:-latest}
    <<: [*defaults, *common-dns]
    container_name: ${JACKETT_CONTAINER_NAME:-jackett}
    ports:
      - "${JACKETT_PORT:-9117}:9117"
    environment:
      <<: *linuxserver-environment
      AUTO_UPDATE: ${JACKETT_AUTO_UPDATE:-true}
      RUN_OPTS: ${JACKETT_RUN_OPTS:-}
      JACKETT_CFG_PORT: ${JACKETT_CFG_PORT:-9117}
      JACKETT_CFG_LOCAL_BIND_ADDRESS: ${JACKETT_CFG_LOCAL_BIND_ADDRESS:-127.0.0.1}
      JACKETT_CFG_ALLOW_EXTERNAL: ${JACKETT_CFG_ALLOW_EXTERNAL:-true}
      JACKETT_CFG_ALLOW_CORS: ${JACKETT_CFG_ALLOW_CORS:-false}
      JACKETT_CFG_API_KEY: ${JACKETT_CFG_API_KEY:-null}
      JACKETT_CFG_ADMIN_PASSWORD: ${JACKETT_CFG_ADMIN_PASSWORD:-null}
      JACKETT_CFG_INSTANCE_ID: ${JACKETT_CFG_INSTANCE_ID:-null}
      JACKETT_CFG_BLACKHOLE_DIR: ${JACKETT_CFG_BLACKHOLE_DIR:-${CONTAINER_DOWNLOADS_DIR:-/downloads}/watch}
      JACKETT_CFG_UPDATE_DISABLED: ${JACKETT_CFG_UPDATE_DISABLED:-false}
      JACKETT_CFG_UPDATE_PRERELEASE: ${JACKETT_CFG_UPDATE_PRERELEASE:-false}
      JACKETT_CFG_BASE_PATH_OVERRIDE: ${JACKETT_CFG_BASE_PATH_OVERRIDE:-null}
      JACKETT_CFG_BASE_URL_OVERRIDE: ${JACKETT_CFG_BASE_URL_OVERRIDE:-null}
      JACKETT_CFG_CACHE_ENABLED: ${JACKETT_CFG_CACHE_ENABLED:-true}
      JACKETT_CFG_CACHE_TTL: ${JACKETT_CFG_CACHE_TTL:-2100}
      JACKETT_CFG_CACHE_MAX_RESULTS_PER_INDEXER: ${JACKETT_CFG_CACHE_MAX_RESULTS_PER_INDEXER:-1000}
      JACKETT_CFG_FLARESOLVERR_URL: ${JACKETT_CFG_FLARESOLVERR_URL:-http://flaresolverr:8191}
      JACKETT_CFG_FLARESOLVERR_MAX_TIMEOUT: ${JACKETT_CFG_FLARESOLVERR_MAX_TIMEOUT:-55000}
      JACKETT_CFG_OMDB_API_KEY: ${JACKETT_CFG_OMDB_API_KEY:-null}
      JACKETT_CFG_OMDB_API_URL: ${JACKETT_CFG_OMDB_API_URL:-https://www.omdbapi.com/}
      JACKETT_CFG_PROXY_TYPE: ${JACKETT_CFG_PROXY_TYPE:-0}
      JACKETT_CFG_PROXY_URL: ${JACKETT_CFG_PROXY_URL:-null}
      JACKETT_CFG_PROXY_PORT: ${JACKETT_CFG_PROXY_PORT:-null}
      JACKETT_CFG_PROXY_USERNAME: ${JACKETT_CFG_PROXY_USERNAME:-null}
      JACKETT_CFG_PROXY_PASSWORD: ${JACKETT_CFG_PROXY_PASSWORD:-null}
      JACKETT_CFG_PROXY_IS_ANONYMOUS: ${JACKETT_CFG_PROXY_IS_ANONYMOUS:-true}
    volumes:
      - ./scripts:/scripts:ro
      - shared-volume:/shared_data
      - ${HOST_CONFIGS_DIR:-./configs}:${CONTAINER_CONFIGS_DIR:-/config}
      - ${HOST_DOWNLOADS_DIR:-./downloads}:${CONTAINER_DOWNLOADS_DIR:-/downloads}
    healthcheck:
      <<: *common-health
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "/scripts/jackett-healthcheck.sh && /scripts/jackett-dns-web-healthcheck.sh && curl -sf http://flaresolverr:8191/ | grep -q 'FlareSolverr'"
    depends_on:
      flaresolverr: *depends-on-healthy
    networks:
      - app_net
    labels:
      - com.torrents-stack.project=expressvpn-stack

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:${QBITTORRENT_IMAGE_TAG:-latest}
    <<: [*defaults, *qbittorrent-command]
    container_name: ${QBITTORRENT_CONTAINER_NAME:-qbittorrent}
    network_mode: "service:expressvpn"
    environment:
      <<: *linuxserver-environment
      WEBUI_PORT: ${QBITTORRENT_WEBUI_PORT:-8080}
      TORRENTING_PORT: ${QBITTORRENT_TORRENTING_PORT:-6881}
      QBITTORRENT_JACKETT_API_KEY: ${QBITTORRENT_JACKETT_API_KEY:-}
      QBITTORRENT_JACKETT_URL: ${QBITTORRENT_JACKETT_URL:-http://jackett:9117}
      QBITTORRENT_JACKETT_THREAD_COUNT: ${QBITTORRENT_JACKETT_THREAD_COUNT:-20}
      QBITTORRENT_JACKETT_TRACKER_FIRST: ${QBITTORRENT_JACKETT_TRACKER_FIRST:-false}
      QBITTORRENT_JACKETT_PLUGIN_URL: ${QBITTORRENT_JACKETT_PLUGIN_URL:-https://raw.githubusercontent.com/qbittorrent/search-plugins/fa0be6abdc47b8622e8ec71a0d4427d9a7770eab/nova3/engines/jackett.py}
      QBITTORRENT_CFG_WEBUI_PASSWORD_PLAINTEXT: ${QBITTORRENT_CFG_WEBUI_PASSWORD_PLAINTEXT}
    volumes:
      - ./scripts:/scripts:ro
      - ${HOST_CONFIGS_DIR:-./configs}:${CONTAINER_CONFIGS_DIR:-/config}
      - ${HOST_DOWNLOADS_DIR:-./downloads}:${CONTAINER_DOWNLOADS_DIR:-/downloads}
      - shared-volume:/shared_data
      - ./scripts/bootstrap-qbittorrent-jackett.sh:/tmp/bootstrap-qbittorrent-jackett.sh:ro
    healthcheck:
      <<: *common-health
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "/scripts/qbittorrent-healthcheck.sh && /scripts/qbittorrent-vpn-healthcheck.sh && /scripts/qbittorrent-expressvpn-healthcheck.sh"
    depends_on:
      expressvpn: *depends-on-healthy
      jackett: *depends-on-healthy
      flaresolverr: *depends-on-healthy
    labels:
      - com.torrents-stack.project=expressvpn-stack

volumes:
  shared-volume:
    labels:
      - com.torrents-stack.project=expressvpn-stack
