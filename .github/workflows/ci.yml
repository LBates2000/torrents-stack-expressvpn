name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run config validation
        run: pwsh ./scripts/validate-config.ps1
      - name: Run test-all
        run: pwsh ./scripts/torrents-stack.ps1 test-all
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-all-output
          path: test-all-output.txt
