name: Workflow Failure Alert

on:
  workflow_run:
    workflows:
      - Compose Validate
      - Backup Restore Reminder
      - Image Tag Drift Check
      - Dependabot Monthly Review
    types:
      - completed

permissions:
  contents: read
  issues: write

jobs:
  open-failure-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const title = `[Workflow Failure] ${run.name} #${run.run_number}`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const exists = openIssues.some(issue => issue.title === title);
            if (exists) {
              core.info('Failure issue already exists for this run.');
              return;
            }

            const body = [
              `Workflow: ${run.name}`,
              `Run number: ${run.run_number}`,
              `Event: ${run.event}`,
              `Branch: ${run.head_branch}`,
              `Commit: ${run.head_sha}`,
              `URL: ${run.html_url}`,
              '',
              'Action items:',
              '- [ ] Review failing logs',
              '- [ ] Identify root cause',
              '- [ ] Apply fix via PR',
              '- [ ] Re-run workflow and confirm green status'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops-alert', 'maintenance'],
              assignees: ['LBates2000']
            });