name: Compose Validate

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Validate Compose config
        run: docker compose -f docker-compose.yml config

  smoke-test:
    needs: validate-compose
    runs-on: ubuntu-latest
    env:
      EXPRESSVPN_ACTIVATION_CODE: ${{ secrets.EXPRESSVPN_ACTIVATION_CODE }}
      EXPRESSVPN_HEALTHCHECK_MODE: relaxed
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start stack
        if: env.EXPRESSVPN_ACTIVATION_CODE != ''
        run: docker compose up -d

      - name: Wait for healthy services
        if: env.EXPRESSVPN_ACTIVATION_CODE != ''
        run: |
          set -euo pipefail
          services=(flaresolverr jackett qbittorrent)
          timeout_seconds=240
          start_time=$(date +%s)

          for service in "${services[@]}"; do
            while true; do
              container_id=$(docker compose ps -q "$service")
              if [ -z "$container_id" ]; then
                echo "$service container not found"
                exit 1
              fi

              health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")
              if [ "$health" = "healthy" ]; then
                echo "$service is healthy"
                break
              fi

              now=$(date +%s)
              elapsed=$((now - start_time))
              if [ "$elapsed" -ge "$timeout_seconds" ]; then
                echo "Timed out waiting for $service to become healthy (last status: $health)"
                docker compose ps
                exit 1
              fi

              echo "Waiting for $service... current health: $health"
              sleep 5
            done
          done

      - name: Show service status
        if: env.EXPRESSVPN_ACTIVATION_CODE != ''
        run: docker compose ps

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans
