name: Image Tag Drift Check

on:
  schedule:
    - cron: "0 15 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-image-tag-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect drift between configured tags and latest image versions
        id: drift
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          ENV_FILE = ".env.example"

          def run(cmd):
              return subprocess.run(cmd, check=True, text=True, capture_output=True)

          def load_env(path):
              values = {}
              with open(path, "r", encoding="utf-8") as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith("#") or "=" not in line:
                          continue
                      key, value = line.split("=", 1)
                      values[key.strip()] = value.strip()
              return values

          def normalize(value):
              return value.strip().lstrip("v")

          env = load_env(ENV_FILE)

          checks = [
              ("EXPRESSVPN_IMAGE_TAG", "polkaned/expressvpn", "expressvpn"),
              ("FLARESOLVERR_IMAGE_TAG", "ghcr.io/flaresolverr/flaresolverr", "flaresolverr"),
              ("JACKETT_IMAGE_TAG", "lscr.io/linuxserver/jackett", "jackett"),
              ("QBITTORRENT_IMAGE_TAG", "lscr.io/linuxserver/qbittorrent", "qbittorrent"),
          ]

          outdated = []
          for env_key, image, service in checks:
              pinned = env.get(env_key, "").strip()
              if not pinned:
                  outdated.append({
                      "service": service,
                      "env_key": env_key,
                      "pinned": "<missing>",
                      "latest": "<unknown>",
                      "reason": "Missing configured tag in .env.example",
                  })
                  continue

              if pinned.lower() == "latest":
                  outdated.append({
                      "service": service,
                      "env_key": env_key,
                      "pinned": pinned,
                      "latest": "<not-evaluated>",
                      "reason": "Configured tag is 'latest', so version drift cannot be meaningfully checked",
                  })
                  continue

              run(["docker", "pull", f"{image}:latest"])
              inspect = run([
                  "docker", "image", "inspect", f"{image}:latest",
                  "--format", "{{ index .Config.Labels \"org.opencontainers.image.version\" }}",
              ])
              latest_version = inspect.stdout.strip() or "latest"

              if normalize(pinned) != normalize(latest_version):
                  outdated.append({
                      "service": service,
                      "env_key": env_key,
                      "pinned": pinned,
                      "latest": latest_version,
                      "reason": "Configured tag differs from latest image version",
                  })

          output_file = os.environ["GITHUB_OUTPUT"]
          with open(output_file, "a", encoding="utf-8") as out:
              out.write(f"outdated_count={len(outdated)}\n")
              out.write("outdated_json<<EOF\n")
              out.write(json.dumps(outdated))
              out.write("\nEOF\n")
          PY

      - name: Create drift issue
        if: steps.drift.outputs.outdated_count != '0'
        uses: actions/github-script@v8
        env:
          OUTDATED_JSON: ${{ steps.drift.outputs.outdated_json }}
        with:
          script: |
            const title = "[Image Tags] Configured tag drift detected";
            const outdated = JSON.parse(process.env.OUTDATED_JSON || "[]");

            const versionDrift = outdated.filter(item =>
              item.reason === "Configured tag differs from latest image version"
            );
            const policyConfigDrift = outdated.filter(item =>
              item.reason !== "Configured tag differs from latest image version"
            );

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            const existing = openIssues.find(i => i.title === title);
            if (existing) {
              core.info("Existing drift issue is already open; skipping new issue creation.");
              return;
            }

            const toRows = (items) => items.map(item =>
              `| ${item.service} | ${item.env_key} | ${item.pinned} | ${item.latest} | ${item.reason} |`
            ).join("\n");

            const versionRows = versionDrift.length
              ? toRows(versionDrift)
              : "| _none_ | _none_ | _none_ | _none_ | _none_ |";

            const policyRows = policyConfigDrift.length
              ? toRows(policyConfigDrift)
              : "| _none_ | _none_ | _none_ | _none_ | _none_ |";

            const body = [
              "Detected image tag drift findings.",
              "",
              "## Version Drift",
              "Configured tag differs from upstream latest image version.",
              "",
              "| Service | Variable | Pinned | Latest | Reason |",
              "|---|---|---|---|---|",
              versionRows,
              "",
              "## Policy/Config Drift",
              "Configuration state that prevents or weakens version drift checks (for example `latest` or missing tag values).",
              "",
              "| Service | Variable | Pinned | Latest | Reason |",
              "|---|---|---|---|---|",
              policyRows,
              "",
              "Suggested actions:",
              "- Review release notes for each image",
              "- Update tag variables in `.env.example`",
              "- Test with `docker compose up -d`",
              "- Cut a release after validation"
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["dependencies", "maintenance"],
              assignees: ["LBates2000"]
            });