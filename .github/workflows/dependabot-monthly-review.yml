name: Dependabot Monthly Review

on:
  schedule:
    - cron: "0 16 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  create-review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create monthly Dependabot review issue
        uses: actions/github-script@v8
        with:
          script: |
            const now = new Date();
            const yyyy = now.getUTCFullYear();
            const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
            const title = `[Monthly Dependabot ${yyyy}-${mm}] Review open updates`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            if (openIssues.some(issue => issue.title === title)) {
              core.info('Monthly Dependabot review issue already exists.');
              return;
            }

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const dependabotPrs = prs.filter(pr => pr.user?.login === 'dependabot[bot]');
            const prList = dependabotPrs.length
              ? dependabotPrs.map(pr => `- [ ] #${pr.number} ${pr.title}`).join('\n')
              : '- [ ] No open Dependabot PRs';

            const body = [
              `Open Dependabot PRs this month: ${dependabotPrs.length}`,
              '',
              'Checklist:',
              prList,
              '- [ ] Prioritize security-related updates first',
              '- [ ] Merge low-risk updates after CI passes',
              '- [ ] Open follow-up issue for deferred updates'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['dependencies', 'maintenance'],
              assignees: ['LBates2000']
            });