name: Prevent .env Tracking

on:
  push:
  pull_request:

jobs:
  guardrail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if .env is tracked
        shell: bash
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "ERROR: .env is tracked by git. Keep secrets in untracked local .env only."
            exit 1
          fi
          echo ".env is not tracked."
